<!DOCTYPE html>
<html id="gameRoot">
<head>
    <!-- Локальный SDK loader -->
    <script src="sdk.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iPhone Clicker — Боковое меню</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-layout">
        <!-- ОСНОВНАЯ ИГРОВАЯ ЗОНА (ЛЕВАЯ) -->
        <div class="main-area">
            <div class="store-header">
                <h1 id="gameTitle">IPHONE CLICKER</h1>
            </div>

            <!-- Строка баланса (кнопка x2 удалена) -->
            <div class="row-balance">
                <div class="balance-box">
                    <span class="balance-label" id="balanceLabel">Б</span>
                    <span class="balance-value" id="balanceDisplay">0</span>
                </div>
            </div>

            <div class="auto-row">
                <div class="auto-label" id="autoLabel">⏱ Б. Сек. <span id="autoIncomeDisplay">0</span></div>
                <div class="auto-value" id="autoRateDisplay">0/сек</div>
            </div>

            <div class="iphone-click-area" id="clickerMain">
                <div class="iphone-model-name" id="currentModelName">iPhone 6</div>
                <img class="iphone-image" id="currentModelImage" src="images/iphone6.jpg" alt="iPhone" draggable="false">
            </div>

            <div class="level-panel">
                <div class="level-text" id="levelDisplay">Уровень 1</div>
                <div class="next-model" id="nextModelDisplay">→ iPhone 6s</div>
            </div>

            <div class="footer-note" id="footerNote">
                кликай по айфону — копи на новый уровень
            </div>
        </div>

        <!-- БОКОВОЕ МЕНЮ УЛУЧШЕНИЙ (ПРАВАЯ ЧАСТЬ) -->
        <div class="upgrades-sidebar">
            <div class="sidebar-header">
                <span>⚡</span> УЛУЧШЕНИЯ <span>🛠️</span>
            </div>
            <div class="shop-list" id="shopList">
                <!-- сюда будут динамически добавляться карточки улучшений -->
            </div>
        </div>
    </div>

    <!-- Уведомление о завершении игры -->
    <div id="completionNotification" class="notification hidden">
        <div class="notification-content">
            <span class="close-btn" id="closeNotification">&times;</span>
            <h2>🎉 Поздравляем!</h2>
            <p>Вы достигли последней модели — <strong>iPhone 17 Pro</strong>!</p>
            <p>Спасибо за прохождение!</p>
            <div class="contacts">
                <span class="thanks-text">✨ Спасибо за игру! ✨</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    
    <!-- Фикс для i18n: устанавливаем язык в HTML-тег -->
    <script>
        function setHtmlLang(lang) {
            if (lang && document.documentElement) {
                document.documentElement.lang = lang;
                console.log('🌐 HTML lang set to:', lang);
            }
        }
        
        if (window.ysdk) {
            try {
                const lang = window.ysdk.environment.i18n.lang;
                setHtmlLang(lang);
            } catch(e) {}
        } else {
            const checkInterval = setInterval(() => {
                if (window.ysdk && window.ysdk.environment) {
                    clearInterval(checkInterval);
                    const lang = window.ysdk.environment.i18n.lang;
                    setHtmlLang(lang);
                }
            }, 100);
        }
    </script>
</body>
</html>
