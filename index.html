<!DOCTYPE html>
<html id="gameRoot">
<head>
    <script src="sdk.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iPhone Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-layout">
        <!-- ЛЕВАЯ КОЛОНКА - МИРЫ -->
        <div class="worlds-sidebar">
            <div class="worlds-header">
                <span>🌍</span> МИРЫ <span>🗺️</span>
            </div>
            <div class="worlds-list" id="worldsList"></div>
            <div class="prestige-info">
                <div class="prestige-bonus">✨ Бонус: x<span id="worldBonus">1</span></div>
                <button class="prestige-btn" id="prestigeBtn" style="display:none">🌟 ПЕРЕРОДИТЬСЯ</button>
            </div>
        </div>

        <!-- ЦЕНТРАЛЬНАЯ КОЛОНКА - ИГРА -->
        <div class="main-area">
            <div class="store-header">
                <h1>IPHONE CLICKER</h1>
            </div>

            <div class="row-balance">
                <div class="balance-box">
                    <span class="balance-label">Б</span>
                    <span class="balance-value" id="balanceDisplay">0</span>
                </div>
                <div class="balance-box">
                    <span class="balance-label">💰</span>
                    <span class="balance-value" id="goldDisplay">0</span>
                </div>
            </div>

            <div class="iphone-click-area" id="clickerMain">
                <div class="iphone-model-name" id="currentModelName">iPhone 6</div>
                <img class="iphone-image" id="currentModelImage" src="images/iphone6.jpg" alt="iPhone" draggable="false">
            </div>

            <div class="level-panel">
                <div class="level-text" id="levelDisplay">Мир iPhone (1/10)</div>
                <div class="next-model" id="nextModelDisplay">→ iPhone 7</div>
            </div>

            <div class="footer-note">
                👆 кликай по айфону | ⭐ выполняй задания | 💎 покупай бусты
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА - БУСТЫ И ЗАДАНИЯ -->
        <div class="upgrades-sidebar">
            <div class="tabs">
                <button class="tab-btn active" data-tab="gold">💰 БУСТЫ</button>
                <button class="tab-btn" data-tab="quests">⭐ ЗАДАНИЯ</button>
            </div>

            <div class="tab-content active" id="tab-gold">
                <div class="shop-list" id="goldShopList"></div>
            </div>

            <div class="tab-content" id="tab-quests">
                <div class="quests-timer" id="questsTimer">🔄 Новые задания через: --:--</div>
                <div class="quests-list" id="questsList"></div>
            </div>
        </div>
    </div>

    <div id="completionNotification" class="notification hidden">
        <div class="notification-content">
            <span class="close-btn" id="closeNotification">&times;</span>
            <h2>🎉 ПОЗДРАВЛЯЕМ!</h2>
            <p>Вы прошли ВСЕ МИРЫ!</p>
            <p>Вы — настоящая ЛЕГЕНДА!</p>
            <div class="thanks-text">✨ Спасибо за игру! ✨</div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if (window.ysdk) {
            try { document.documentElement.lang = window.ysdk.environment.i18n.lang; } catch(e) {}
        }
    </script>
</body>
</html>
